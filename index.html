<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник - Вениамин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d143c;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .animate-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .grade-card:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="text-white selection:bg-blue-500/30">

    <div id="app" class="flex flex-col min-h-screen max-w-md mx-auto overflow-hidden relative pb-24">
        
        <!-- ШАПКА -->
        <div class="p-4 flex items-center justify-between mt-2">
            <div class="flex items-center gap-3 bg-[#1e2b61] p-2 pr-6 rounded-2xl shadow-lg border border-white/5">
                <div id="avatar-initials" class="w-11 h-11 rounded-full bg-[#5d81f5] flex items-center justify-center text-sm font-bold border border-white/20">
                    ВЕ
                </div>
                <div>
                    <h1 id="display-name" class="text-sm font-bold leading-tight">Вениамин</h1>
                    <p id="display-school" class="text-[10px] text-blue-300/60 font-medium">31 — мактаб</p>
                </div>
            </div>
            <button onclick="toggleModal(true)" class="w-11 h-11 rounded-2xl bg-[#1e2b61] flex items-center justify-center border border-white/5 shadow-lg active:scale-95 transition-all">
                <i data-lucide="plus" class="text-blue-200"></i>
            </button>
        </div>

        <!-- РЕЙТИНГ -->
        <div class="px-4 grid grid-cols-12 gap-3 mb-6">
            <div class="col-span-8 bg-[#162155] rounded-[32px] p-5 border border-white/5 shadow-xl">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-[13px] font-bold text-blue-50">Рейтинг в классе</h2>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-blue-300/40"></i>
                </div>
                
                <div id="rating-list" class="space-y-4">
                    <!-- Рендерится скриптом -->
                </div>
            </div>

            <div class="col-span-4 flex flex-col gap-3">
                <div class="flex-1 bg-[#162155] rounded-[28px] p-4 border border-white/5 flex flex-col items-center justify-center text-center shadow-xl">
                    <i data-lucide="bell" class="w-5 h-5 text-blue-100 mb-1"></i>
                    <span class="text-[11px] font-bold text-blue-50 leading-none">События</span>
                </div>
                <div class="flex-1 bg-[#162155] rounded-[28px] p-1 border border-white/5 relative overflow-hidden">
                    <div class="absolute inset-0 z-0 opacity-20 bg-gradient-to-br from-indigo-500 to-transparent"></div>
                    <div class="relative z-10 flex flex-col items-center h-full justify-between p-1">
                        <div class="bg-[#e65b2d] rounded-lg px-2 py-0.5 flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-2 h-2 fill-white"></i>
                            <span class="text-[8px] font-black text-white uppercase tracking-tighter">В школе</span>
                        </div>
                        <div class="w-8 h-8 rounded-full border-2 border-white/80 overflow-hidden shadow-lg mb-1">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=boy" alt="me">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ПОСЛЕДНИЕ ОЦЕНКИ -->
        <div class="px-4 mb-8">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-[15px] font-black">Последние оценки</h2>
                <span class="text-[10px] text-blue-400 font-bold uppercase opacity-50">Листай →</span>
            </div>
            
            <div id="grades-container" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide px-1 snap-x snap-mandatory">
                <!-- Оценки -->
            </div>
        </div>

        <!-- РАСПИСАНИЕ -->
        <div class="bg-black rounded-t-[44px] p-7 shadow-[0_-15px_40px_rgba(0,0,0,0.8)] mt-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black tracking-tight">Расписание</h2>
                <div class="flex gap-5 text-blue-500">
                    <i data-lucide="chevron-left" class="cursor-pointer"></i>
                    <i data-lucide="chevron-right" class="cursor-pointer"></i>
                </div>
            </div>

            <div class="bg-[#121212] rounded-[36px] p-6 border border-white/5">
                <h3 class="text-[15px] font-black mb-1">Ср, 1 апр. <span class="text-blue-500 ml-2 italic text-sm">Сегодня</span></h3>
                <div class="flex items-center gap-2 text-gray-500 mb-6">
                    <i data-lucide="check" class="w-3.5 h-3.5 text-blue-400"></i>
                    <span class="text-[11px] font-bold"><span class="text-white">0/3</span> ДЗ на сегодня</span>
                </div>
                
                <div class="bg-[#1c1c1c] rounded-3xl p-4 border border-white/5 flex justify-between items-center shadow-md">
                    <div>
                        <h4 class="text-[13px] font-black">2. Англ. язык</h4>
                        <p class="text-[11px] text-gray-500 font-bold">8:50 - 9:35</p>
                    </div>
                    <div class="bg-[#44a02c] px-4 py-1.5 rounded-xl text-sm font-black shadow-lg">8</div>
                </div>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ -->
        <div id="settings-modal" class="fixed inset-0 z-50 bg-[#060b21] hidden p-6 overflow-y-auto animate-in">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black">Редактировать</h2>
                <button onclick="toggleModal(false)" class="p-2 bg-white/5 rounded-full"><i data-lucide="x"></i></button>
            </div>

            <div class="space-y-6">
                <!-- Профиль -->
                <div class="bg-[#162155] p-5 rounded-[32px] border border-white/10 space-y-4 shadow-xl">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest px-1">Ваше имя</label>
                        <input type="text" id="input-name" class="w-full bg-[#0d143c] p-4 rounded-2xl outline-none border border-white/5 font-bold focus:border-blue-500 transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest px-1">Ваше место</label>
                            <input type="number" id="input-rank" class="w-full bg-[#0d143c] p-4 rounded-2xl outline-none border border-white/5 font-bold text-center">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest px-1">Баллы</label>
                            <input type="number" id="input-points" class="w-full bg-[#0d143c] p-4 rounded-2xl outline-none border border-white/5 font-bold text-center">
                        </div>
                    </div>
                </div>

                <!-- Новая оценка -->
                <div class="bg-[#162155] p-5 rounded-[32px] border border-white/10 space-y-4 shadow-xl">
                    <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest px-1">Поставить оценку</h3>
                    
                    <div id="subjects-list" class="flex flex-wrap gap-2">
                        <!-- Предметы -->
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="input-score" placeholder="Напр: 30/30 или 9" class="flex-1 bg-[#0d143c] p-4 rounded-2xl outline-none border border-white/5 font-bold">
                        <button onclick="addGrade()" class="bg-blue-600 px-6 rounded-2xl font-black shadow-lg active:scale-95 transition-all">ОК</button>
                    </div>
                    <p class="text-[9px] text-blue-300/40 font-bold px-1 italic">* Если 30/30 — будет зеленая автоматически</p>
                </div>

                <button onclick="saveProfile()" class="w-full bg-white text-black p-5 rounded-[24px] font-black text-lg active:scale-95 transition-all mt-4 shadow-2xl">
                    Сохранить изменения
                </button>
            </div>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0d143c]/90 backdrop-blur-md border-t border-white/5 px-8 py-5 flex justify-between items-center z-40">
            <i data-lucide="home" class="text-blue-500 cursor-pointer"></i>
            <i data-lucide="message-circle" class="text-gray-600 cursor-pointer"></i>
            <i data-lucide="book-open" class="text-gray-600 cursor-pointer"></i>
            <i data-lucide="bar-chart-2" class="text-gray-600 cursor-pointer"></i>
            <button onclick="toggleModal(true)"><i data-lucide="user" class="text-gray-600"></i></button>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ (State) ---
        let profile = {
            name: 'Вениамин',
            rank: 44,
            points: 10,
            school: '31 — мактаб'
        };

        let grades = [
            { id: 1, subject: 'Математика', score: '30/30', date: 'СОР, ЗА 2 АПР.', isNew: true, color: '#44a02c' },
            { id: 2, subject: 'Рус. язык', score: '9', date: 'ОТВ, ЗА 2 АПР.', isNew: true, color: '#44a02c' },
            { id: 3, subject: 'Литература', score: '7', date: 'ОТВ, ЗА 1 АПР.', isNew: false, color: '#e67e22' },
            { id: 4, subject: 'Англ. язык', score: '8', date: 'ОТВ, ЗА 1 АПР.', isNew: false, color: '#44a02c' },
            { id: 5, subject: 'Физика', score: '4', date: 'ОТВ, ЗА 31 МАР.', isNew: false, color: '#9b1d1d' },
        ];

        let selectedSubject = 'Математика';
        const subjects = ['Математика', 'Рус. язык', 'Литература', 'Англ. язык', 'История (СОЧ)', 'Физика', 'Химия', 'Технология', 'География'];

        // --- ФУНКЦИИ ОБНОВЛЕНИЯ UI ---

        function renderAll() {
            const initials = profile.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            document.getElementById('avatar-initials').innerText = initials;
            document.getElementById('display-name').innerText = profile.name;
            document.getElementById('display-school').innerText = profile.school;

            renderRating();
            renderGrades();
            renderSubjectSelectors();
            lucide.createIcons();
        }

        function renderRating() {
            const container = document.getElementById('rating-list');
            const rank = Number(profile.rank);
            const pts = Number(profile.points);
            let html = '';
            
            if (rank > 1) {
                html += `<div class="flex items-center gap-2 opacity-30"><span class="text-[11px] w-5 italic">${rank - 1}</span><div class="flex-1 h-7 bg-[#0a1033] rounded-full flex items-center px-1"><div class="w-5 h-5 rounded-full bg-blue-400 ml-auto mr-1 overflow-hidden"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${rank-1}"/></div></div><span class="text-[11px] font-bold">${pts + 3}</span></div>`;
            }

            html += `<div class="flex items-center gap-2"><span class="text-[12px] text-blue-400 w-5 font-black italic">${rank}</span><div class="flex-1 h-10 bg-[#3b59df] rounded-full flex items-center px-1 shadow-lg border border-white/10 relative overflow-hidden"><div class="w-8 h-8 rounded-full bg-white text-[#3b59df] text-[11px] font-black flex items-center justify-center ml-auto">${profile.name[0].toUpperCase()}</div></div><span class="text-[12px] font-black text-white">${pts}</span></div>`;

            html += `<div class="flex items-center gap-2 opacity-30"><span class="text-[11px] w-5 italic">${rank + 1}</span><div class="flex-1 h-7 bg-[#0a1033] rounded-full flex items-center px-1"><div class="w-5 h-5 rounded-full bg-orange-400 ml-auto mr-1 overflow-hidden"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=${rank+1}"/></div></div><span class="text-[11px] font-bold">${Math.max(0, pts - 2)}</span></div>`;

            container.innerHTML = html;
        }

        function renderGrades() {
            const container = document.getElementById('grades-container');
            container.innerHTML = grades.map(item => `
                <div onclick="markAsRead(${item.id})" class="grade-card min-w-[110px] snap-center bg-[#162155] rounded-[24px] p-4 flex flex-col items-center text-center border border-white/5 shadow-lg relative cursor-pointer transition-all duration-200">
                    ${item.isNew ? '<div class="absolute top-3 right-3 w-3.5 h-3.5 bg-[#3b82f6] rounded-full border-2 border-[#162155] shadow-[0_0_10px_#3b82f6]"></div>' : ''}
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-[16px] font-black mb-3 shadow-xl border border-white/10" style="background-color: ${item.color}">
                        ${item.score}
                    </div>
                    <span class="text-[11px] font-bold mb-1 truncate w-full text-blue-50 uppercase tracking-tighter">${item.subject}</span>
                    <span class="text-[9px] text-blue-300/40 font-bold uppercase tracking-tight">${item.date}</span>
                </div>
            `).join('');
        }

        function renderSubjectSelectors() {
            const container = document.getElementById('subjects-list');
            container.innerHTML = subjects.map(s => `
                <button onclick="selectedSubject = '${s}'; renderSubjectSelectors();" 
                        class="px-3 py-2 rounded-xl text-[9px] font-bold border transition-all ${selectedSubject === s ? 'bg-blue-600 border-blue-400' : 'bg-[#0d143c] border-white/5'}">
                    ${s}
                </button>
            `).join('');
        }

        // --- ЛОГИКА ---

        function toggleModal(show) {
            const modal = document.getElementById('settings-modal');
            if (show) {
                document.getElementById('input-name').value = profile.name;
                document.getElementById('input-rank').value = profile.rank;
                document.getElementById('input-points').value = profile.points;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveProfile() {
            profile.name = document.getElementById('input-name').value;
            profile.rank = document.getElementById('input-rank').value;
            profile.points = document.getElementById('input-points').value;
            renderAll();
            toggleModal(false);
        }

        function addGrade() {
            const rawScore = document.getElementById('input-score').value.trim();
            if (!rawScore) return;

            let finalColor = '#44a02c'; // Дефолт зеленый

            // Логика с дробью (процентная система)
            if (rawScore.includes('/')) {
                const parts = rawScore.split('/');
                const current = parseFloat(parts[0]);
                const total = parseFloat(parts[1]);
                
                if (!isNaN(current) && !isNaN(total) && total > 0) {
                    const percent = (current / total) * 100;
                    
                    if (percent >= 99.9) finalColor = '#44a02c'; // 30/30, 25/25 и т.д.
                    else if (percent >= 80) finalColor = '#44a02c'; // 4 и 5
                    else if (percent >= 40) finalColor = '#e67e22'; // 3
                    else finalColor = '#9b1d1d'; // 2
                }
            } 
            // Логика обычных чисел
            else {
                const scoreValue = parseInt(rawScore);
                if (scoreValue >= 11) {
                    if (scoreValue >= 40) finalColor = '#44a02c';
                    else if (scoreValue >= 15) finalColor = '#e67e22';
                    else finalColor = '#9b1d1d';
                } else {
                    if (scoreValue >= 8) finalColor = '#44a02c';
                    else if (scoreValue >= 5) finalColor = '#e67e22';
                    else finalColor = '#9b1d1d';
                }
            }

            const newGrade = {
                id: Date.now(),
                subject: selectedSubject,
                score: rawScore,
                date: `ОТВ, ЗА ${new Date().getDate()} АПР.`,
                isNew: true,
                color: finalColor
            };

            grades = [newGrade, ...grades];
            document.getElementById('input-score').value = '';
            renderAll();
            toggleModal(false);
            
            setTimeout(() => {
                document.getElementById('grades-container').scrollLeft = 0;
            }, 100);
        }

        function markAsRead(id) {
            grades = grades.map(g => g.id === id ? { ...g, isNew: false } : g);
            renderGrades();
        }

        window.onload = renderAll;
    </script>
</body>
</html>
